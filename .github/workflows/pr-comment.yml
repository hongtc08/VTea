# .github/workflows/pr-comment.yml
name: 📝 PR Comment Bot

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  comment-checklist:
    name: Add PR Checklist
    runs-on: ubuntu-latest

    steps:
      - name: 📝 Add Checklist Comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            const checklistComment = `
            ## 🔍 PR Review Checklist
            
            ### Code Quality
            - [ ] ✅ Architecture test passed (MVC + DAO)
            - [ ] ✅ SQL syntax là backticks (\`table\`) không phải quotes ('table')
            - [ ] ✅ Không có java.sql import trong Controller
            - [ ] ✅ Model layer độc lập (không gọi DAO/Controller)
            
            ### Testing
            - [ ] ✅ Unit tests passed
            - [ ] ✅ Code compiles without errors
            - [ ] ✅ No breaking changes
            
            ### Implementation
            - [ ] ✅ DAO methods xử lý exception
            - [ ] ✅ Naming convention tuân thủ (DAO, Controller, Service)
            - [ ] ✅ Sử dụng PreparedStatement (prevent SQL injection)
            - [ ] ✅ Sử dụng try-with-resources (auto close)
            
            ### Database
            - [ ] ✅ Kết nối Aiven MySQL đã test
            - [ ] ✅ Không hardcode password
            - [ ] ✅ Connection pool properly managed
            
            ---
            **Automated checks:** Run \`mvn test\` locally before push!
            `;
            
            github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: prNumber,
              body: checklistComment
            });