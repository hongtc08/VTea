# .github/workflows/mvc-dao-check.yml
name: ✅ MVC + DAO Structure Validation

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/main/java/**"
      - "pom.xml"

jobs:
  validate-structure:
    name: Validate MVC + DAO
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📊 Check Project Structure
        run: |
          echo "🔍 Kiểm tra cấu trúc MVC + DAO..."
          echo ""
          
          # Check Model layer exists
          if [ -d "src/main/java/com/vtea/model" ]; then
            echo "✅ Model layer: $(ls src/main/java/com/vtea/model/*.java 2>/dev/null | wc -l) files"
          else
            echo "❌ ERROR: Model layer không tìm thấy"
            exit 1
          fi
          
          # Check DAO layer exists
          if [ -d "src/main/java/com/vtea/dao" ]; then
            echo "✅ DAO layer: $(ls src/main/java/com/vtea/dao/*.java 2>/dev/null | wc -l) files"
          else
            echo "❌ ERROR: DAO layer không tìm thấy"
            exit 1
          fi
          
          # Check Controller layer exists
          if [ -d "src/main/java/com/vtea/controller" ]; then
            echo "✅ Controller layer: $(ls src/main/java/com/vtea/controller/*.java 2>/dev/null | wc -l) files"
          else
            echo "❌ ERROR: Controller layer không tìm thấy"
            exit 1
          fi
          
          # Check Service layer exists
          if [ -d "src/main/java/com/vtea/service" ]; then
            echo "✅ Service layer: $(ls src/main/java/com/vtea/service/*.java 2>/dev/null | wc -l) files"
          else
            echo "⚠️  Service layer không tìm thấy"
          fi
          
          # Check DTO layer exists
          if [ -d "src/main/java/com/vtea/dto" ]; then
            echo "✅ DTO layer: $(ls src/main/java/com/vtea/dto/*.java 2>/dev/null | wc -l) files"
          else
            echo "⚠️  DTO layer không tìm thấy"
          fi
          
          echo ""
          echo "🎯 Cấu trúc MVC + DAO: ✅ VALID"

      - name: 🧪 Run Architecture Tests
        run: mvn -B test -Dtest=ArchitectureTest --file pom.xml

      - name: 📋 Naming Convention Check
        run: |
          echo "🔍 Kiểm tra naming convention..."
          
          # Tất cả DAO phải kết thúc bằng "DAO"
          ERROR=0
          for file in src/main/java/com/vtea/dao/*.java; do
            if [[ ! $(basename "$file") =~ DAO\.java$ ]]; then
              echo "❌ File DAO phải kết thúc bằng 'DAO': $(basename $file)"
              ERROR=1
            fi
          done
          
          # Tất cả Controller phải kết thúc bằng "Controller"
          for file in src/main/java/com/vtea/controller/*.java; do
            if [[ ! $(basename "$file") =~ Controller\.java$ ]]; then
              echo "❌ File Controller phải kết thúc bằng 'Controller': $(basename $file)"
              ERROR=1
            fi
          done
          
          if [ $ERROR -eq 0 ]; then
            echo "✅ Naming convention: PASS"
          else
            exit 1
          fi