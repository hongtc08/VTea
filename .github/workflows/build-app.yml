name: Build & Đóng gói App

on:
  # TẠM THỜI TẮT TỰ ĐỘNG: Bỏ comment 2 dòng dưới đây khi nào dự án ổn định muốn bật lại
  # pull_request:
  #   branches: [ "main" ]

  # CHẾ ĐỘ NGỦ ĐÔNG: Chỉ hiện nút bấm chạy bằng tay (Manual trigger) trên web
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clone code về máy chủ
      uses: actions/checkout@v3

    - name: Cài đặt Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Chạy thử Build và Đóng gói (Không chạy test kiến trúc)
      # Lệnh này quét toàn bộ project xem có lỗi cú pháp không và đóng gói thành file .jar
      run: mvn -B clean package -DskipTests --file pom.xml
