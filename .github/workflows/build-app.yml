# .github/workflows/build-app.yml
name: 🚀 Build & Package App

on:
  # Trigger khi merge vào main
  push:
    branches: [ "main" ]
  
  # Manual trigger (chạy bằng tay từ GitHub UI)
  workflow_dispatch:

jobs:
  build-and-package:
    name: Build, Test & Package
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clone code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔍 Run Code Quality Check
        run: mvn -B clean compile --file pom.xml

      - name: 🧪 Run Tests (Architecture + Unit)
        run: mvn -B test --file pom.xml

      - name: 📦 Build & Package JAR
        if: success()
        run: mvn -B package -DskipTests --file pom.xml

      - name: 📤 Upload Artifact (JAR)
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: vtea-app-jar
          path: target/*.jar
          retention-days: 30

      - name: 📤 Upload Artifact (Test Reports)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 30

      - name: 🎯 Build Status
        if: always()
        run: |
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ BUILD SUCCESSFUL"
            echo "=========================================="
            echo "📦 Artifacts ready for download"
            echo "📍 Location: target/"
          else
            echo "❌ BUILD FAILED"
            echo "=========================================="
            echo "⚠️  Check test reports above"
          fi
          echo "=========================================="