# .github/workflows/code-quality.yml
name: 🔎 Code Quality Check

on:
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  code-quality:
    name: Check Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔍 Compile & Check Syntax
        run: mvn -B clean compile --file pom.xml

      - name: 🧪 Run Unit Tests
        run: mvn -B test --file pom.xml

      - name: 📋 Check SQL Syntax Issues
        run: |
          echo "Checking for SQL syntax issues..."
          # Tìm các dòng có quotes sai trong SQL
          if grep -r "FROM '" src/main/java --include="*.java"; then
            echo "❌ ERROR: Tìm thấy SQL quotes sai (FROM ' thay vì FROM \`)"
            exit 1
          fi
          if grep -r "INSERT INTO '" src/main/java --include="*.java"; then
            echo "❌ ERROR: Tìm thấy SQL quotes sai (INSERT INTO ' thay vì INSERT INTO \`)"
            exit 1
          fi
          echo "✅ SQL syntax check passed"

      - name: 📝 Comment on PR (if failed)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Code Quality Check Failed**\n\n' +
                    '- ⚠️ Fix SQL syntax issues\n' +
                    '- ⚠️ Check unit test failures\n\n' +
                    '[View detailed logs →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            })

      - name: 📝 Comment on PR (if success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Code Quality Check Passed!**\n\n' +
                    '- ✓ Syntax check: PASS\n' +
                    '- ✓ Unit tests: PASS\n' +
                    '- ✓ Architecture: PASS\n\n' +
                    'Ready to merge! 🎉'
            })