# .github/workflows/build-and-package.yml
name: 🚀 Build & Package App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build, Test & Package JAR
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clone code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 📋 Display Build Info
        run: |
          echo "=========================================="
          echo "🔨 Build Information"
          echo "=========================================="
          echo "Java Version:"
          java -version
          echo ""
          echo "Maven Version:"
          mvn --version
          echo "=========================================="

      - name: 🧹 Clean & Compile
        run: |
          echo "=========================================="
          echo "🧹 Cleaning & Compiling"
          echo "=========================================="
          mvn -B clean compile --file pom.xml
          echo "=========================================="

      - name: 🧪 Run Tests
        run: |
          echo "=========================================="
          echo "🧪 Running Tests"
          echo "=========================================="
          mvn -B test --file pom.xml
          echo "=========================================="

      - name: 📦 Build JAR Package
        run: |
          echo "=========================================="
          echo "📦 Building JAR Package"
          echo "=========================================="
          mvn -B package -DskipTests --file pom.xml
          echo "=========================================="

      - name: 📂 List Build Artifacts
        run: |
          echo "=========================================="
          echo "📂 Build Artifacts"
          echo "=========================================="
          ls -lh target/*.jar
          echo "=========================================="

      - name: 📤 Upload JAR Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vtea-app-jar
          path: target/VTea-POS-*.jar
          retention-days: 30

      - name: 📤 Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 30

      - name: ✅ Build Complete
        if: always()
        run: |
          echo ""
          echo "=========================================="
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ BUILD SUCCESSFUL!"
            echo "=========================================="
            echo "✓ Compilation: SUCCESS"
            echo "✓ Tests: PASSED"
            echo "✓ JAR Package: CREATED"
            echo "=========================================="
            echo "📦 Artifacts available for download"
            echo "📍 Location: target/"
          else
            echo "❌ BUILD FAILED"
            echo "=========================================="
            echo "Check logs above for errors"
          fi
          echo "=========================================="