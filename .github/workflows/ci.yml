# .github/workflows/ci.yml
name: 🚀 CI (Build, Test & Validate)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build, Validate & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clone code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 1. Kiểm tra nhanh lỗi cú pháp SQL (Nháy đơn)
      - name: 🔍 Check SQL Syntax (Single Quotes)
        run: |
          if grep -r -E "FROM '|INSERT INTO '|UPDATE '" src/main/java; then
            echo "❌ ERROR: Phát hiện nháy đơn sai chuẩn trong câu lệnh SQL! Hãy dùng dấu backtick (\`) hoặc không dùng dấu."
            exit 1
          else
            echo "✅ SQL Syntax OK."
          fi

      # 2. Maven sẽ tự động Compile, chạy Unit Test, chạy ArchUnit Test và Package
      # Chỉ cần 1 lệnh duy nhất này là đủ, tiết kiệm 70% thời gian so với file cũ
      - name: 🛠️ Compile, Test & Package
        run: mvn -B clean package

      # 3. Lưu trữ file JAR (chỉ chạy khi nhánh main được push)
      - name: 📤 Upload JAR Artifact
        if: success() && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: vtea-app-jar
          path: target/*.jar
          retention-days: 15

      # 4. Lưu trữ Report Test (chạy luôn cả khi test rớt để xem lỗi)
      - name: 📤 Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7