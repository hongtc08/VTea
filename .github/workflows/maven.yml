name: Kiểm tra Kiến trúc (ArchUnit)

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clone code về máy chủ
      uses: actions/checkout@v3

    - name: Cài đặt Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Chạy bài Test Kiến Trúc
      # Lệnh này tự động đọc file ArchitectureTest.java để chấm điểm cấu trúc MVC
      run: mvn -B test --file pom.xml
