# .github/workflows/test-and-validate.yml
name: 🧪 Test & Validate Code

on:
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    name: Validate MVC + DAO & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clone code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 📋 Display Java Version
        run: java -version

      # ============== ARCHITECTURE VALIDATION ==============
      - name: 🏗️ Check Project Structure (MVC + DAO)
        run: |
          echo "=========================================="
          echo "🔍 Validating MVC + DAO Structure"
          echo "=========================================="
          
          # Check Model layer
          if [ -d "src/main/java/com/vtea/model" ]; then
            MODEL_COUNT=$(ls src/main/java/com/vtea/model/*.java 2>/dev/null | wc -l)
            echo "✅ Model layer: $MODEL_COUNT files"
          else
            echo "❌ Model layer: NOT FOUND"
            exit 1
          fi
          
          # Check DAO layer
          if [ -d "src/main/java/com/vtea/dao" ]; then
            DAO_COUNT=$(ls src/main/java/com/vtea/dao/*.java 2>/dev/null | wc -l)
            echo "✅ DAO layer: $DAO_COUNT files"
          else
            echo "❌ DAO layer: NOT FOUND"
            exit 1
          fi
          
          # Check Controller layer
          if [ -d "src/main/java/com/vtea/controller" ]; then
            CTRL_COUNT=$(ls src/main/java/com/vtea/controller/*.java 2>/dev/null | wc -l)
            echo "✅ Controller layer: $CTRL_COUNT files"
          else
            echo "❌ Controller layer: NOT FOUND"
            exit 1
          fi
          
          # Check Service layer
          if [ -d "src/main/java/com/vtea/service" ]; then
            SVC_COUNT=$(ls src/main/java/com/vtea/service/*.java 2>/dev/null | wc -l)
            echo "✅ Service layer: $SVC_COUNT files"
          else
            echo "⚠️  Service layer: Optional (not found)"
          fi
          
          # Check DTO layer
          if [ -d "src/main/java/com/vtea/dto" ]; then
            DTO_COUNT=$(ls src/main/java/com/vtea/dto/*.java 2>/dev/null | wc -l)
            echo "✅ DTO layer: $DTO_COUNT files"
          else
            echo "⚠️  DTO layer: Optional (not found)"
          fi
          
          echo ""
          echo "✅ MVC + DAO Structure: VALID"
          echo "=========================================="

      # ============== SQL SYNTAX CHECK ==============
      - name: 🔍 Check SQL Syntax (No Single Quotes for Table Names)
        run: |
          echo "=========================================="
          echo "🔎 Checking SQL Syntax"
          echo "=========================================="
          
          ERROR=0
          
          # Check for incorrect SQL quotes
          if grep -r "FROM '" src/main/java --include="*.java"; then
            echo ""
            echo "❌ ERROR: Found incorrect SQL quotes (FROM ' instead of FROM \`)"
            ERROR=1
          fi
          
          if grep -r "INSERT INTO '" src/main/java --include="*.java"; then
            echo ""
            echo "❌ ERROR: Found incorrect SQL quotes (INSERT INTO ' instead of INSERT INTO \`)"
            ERROR=1
          fi
          
          if grep -r "UPDATE '" src/main/java --include="*.java"; then
            echo ""
            echo "❌ ERROR: Found incorrect SQL quotes (UPDATE ' instead of UPDATE \`)"
            ERROR=1
          fi
          
          if [ $ERROR -eq 0 ]; then
            echo "✅ SQL Syntax: VALID (No incorrect quotes found)"
          else
            echo "=========================================="
            echo "❌ SQL Syntax Check: FAILED"
            echo "=========================================="
            exit 1
          fi
          echo "=========================================="

      # ============== NAMING CONVENTION ==============
      - name: 📝 Check Naming Convention
        run: |
          echo "=========================================="
          echo "📋 Checking Naming Convention"
          echo "=========================================="
          
          ERROR=0
          
          # All DAO files must end with "DAO"
          if [ -d "src/main/java/com/vtea/dao" ]; then
            for file in src/main/java/com/vtea/dao/*.java; do
              if [[ ! $(basename "$file") =~ DAO\.java$ ]]; then
                echo "❌ DAO file must end with 'DAO': $(basename $file)"
                ERROR=1
              fi
            done
          fi
          
          # All Controller files must end with "Controller"
          if [ -d "src/main/java/com/vtea/controller" ]; then
            for file in src/main/java/com/vtea/controller/*.java; do
              if [[ ! $(basename "$file") =~ Controller\.java$ ]]; then
                echo "❌ Controller file must end with 'Controller': $(basename $file)"
                ERROR=1
              fi
            done
          fi
          
          if [ $ERROR -eq 0 ]; then
            echo "✅ Naming Convention: VALID"
          else
            echo "=========================================="
            echo "❌ Naming Convention Check: FAILED"
            echo "=========================================="
            exit 1
          fi
          echo "=========================================="

      # ============== COMPILATION ==============
      - name: 🛠️ Compile Code
        run: |
          echo "=========================================="
          echo "🔨 Compiling Code"
          echo "=========================================="
          mvn -B clean compile --file pom.xml
          echo "=========================================="

      # ============== ARCHITECTURE TESTS ==============
      - name: 🏗️ Run Architecture Tests (ArchUnit)
        run: |
          echo "=========================================="
          echo "🧪 Running Architecture Tests"
          echo "=========================================="
          mvn -B test -Dtest=ArchitectureTest --file pom.xml
          echo "=========================================="

      # ============== UNIT TESTS ==============
      - name: 🧪 Run All Unit Tests
        run: |
          echo "=========================================="
          echo "🧪 Running Unit Tests"
          echo "=========================================="
          mvn -B test --file pom.xml
          echo "=========================================="

      # ============== UPLOAD REPORTS ==============
      - name: 📤 Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      # ============== FINAL SUMMARY ==============
      - name: ✅ Final Summary
        if: always()
        run: |
          echo ""
          echo "=========================================="
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ ALL CHECKS PASSED!"
            echo "=========================================="
            echo "✓ MVC + DAO Structure: VALID"
            echo "✓ SQL Syntax: VALID"
            echo "✓ Naming Convention: VALID"
            echo "✓ Compilation: SUCCESS"
            echo "✓ Architecture Tests: PASSED"
            echo "✓ Unit Tests: PASSED"
            echo "=========================================="
            echo "🎉 Ready to merge!"
          else
            echo "❌ SOME CHECKS FAILED"
            echo "=========================================="
            echo "Please fix the errors above and push again"
          fi
          echo "=========================================="